name: Python Lint
on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
  
    steps:
        - name: code checkout
          uses: actions/checkout@v4
        
        - name: validate python version 3.13
          uses: actions/setup-python@v5
          with:
            python-version: "3.13" 

        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Run linter
          run: python -m flake8 app.py
