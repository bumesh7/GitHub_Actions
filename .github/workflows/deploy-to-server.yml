# this will deploy the safe / secure / tested app to prod server

name: Deploy To server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to prod server
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Add public ip, username = ubuntu, key = private key .pem (cat serverkey.pem in local )
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Starting Deployment"
            mkdir Devops