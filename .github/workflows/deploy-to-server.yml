# this will deploy the safe / secure / tested app to prod server

name: Deploy To server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: SSH to prod server and create app folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Add public ip, username = ubuntu, key = private key .pem (cat serverkey.pem in local )
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Installing required software and creat dir"
            sudo apt-get install docker.io && sudo apt-get install docker-compose-v2 -y
            sudo usermod -aG docker $USER && newgrp docker
            mkdir -p Devops

      - name: Copy the Docker Compose file
        uses: appleboy/scp-action@v1
        with:
          # Add public ip, username = ubuntu, key = private key .pem (cat serverkey.pem in local )
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: ./docker-compose.yml
          target: ~/Devops
      
      # install docker, add docker group, export docker cred, run docker compose
      - name: SSH to prod server and run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Add public ip, username = ubuntu, key = private key .pem (cat serverkey.pem in local )
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Running App"
            sudo apt-get update && sudo apt-get upgrade -y
            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
            export DOCKER_TAG=${{ github.sha }}
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USER }} --password-stdin
            cd ~/Devops && docker compose down && docker compose up -d --build --force-recreate --pull always
