# Liniting and SAST scan
# lint - flake8 & SAST - Bandit tools
name: Code Quality

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

  
    steps:
        - name: code checkout
          uses: actions/checkout@v4
        
        - name: validate python version ${{ matrix.python-version }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ matrix.python-version }}

        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Run linter
          run: python -m flake8 app.py

        - name: Run SAST
          run: bandit -r app.py
