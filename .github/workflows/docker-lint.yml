 # Scan the Dockerfile for issues & Common Vulnerablities and Exposer (CVEs)
name: Docker Lint

on:
  workflow_call:



jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      
      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
     